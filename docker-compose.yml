services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       9hbrouette
      POSTGRES_USER:     brouette
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brouette -d 9hbrouette"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV:       production
      PORT:           3333
      HOST:           0.0.0.0
      LOG_LEVEL:      info
      SESSION_DRIVER: cookie
      APP_KEY:        ${APP_KEY}
      APP_URL:        ${APP_URL}
      DB_CONNECTION:  pg
      DB_HOST:        postgres
      DB_PORT:        5432
      DB_USER:        brouette
      DB_PASSWORD:    ${DB_PASSWORD}
      DB_DATABASE:    9hbrouette
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  inscription:
    build:
      context: .
      dockerfile: apps/inscription/Dockerfile
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.inscription.rule=Host(`inscription.${DOMAIN}`)"
      - "traefik.http.routers.inscription.entrypoints=websecure"
      - "traefik.http.routers.inscription.tls.certresolver=letsencrypt"
      - "traefik.http.services.inscription.loadbalancer.server.port=80"
    networks:
      - default
      - dokploy-network
    depends_on:
      - api
    restart: unless-stopped

  compteur:
    build:
      context: .
      dockerfile: apps/compteur/Dockerfile
      args:
        VITE_INSCRIPTION_URL: https://inscription.${DOMAIN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.compteur.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.compteur.entrypoints=websecure"
      - "traefik.http.routers.compteur.tls.certresolver=letsencrypt"
      - "traefik.http.services.compteur.loadbalancer.server.port=80"
    networks:
      - default
      - dokploy-network
    depends_on:
      - api
    restart: unless-stopped

  adminer:
    image: adminer:latest
    networks:
      - default
      - dokploy-network
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
  dokploy-network:
    external: true
